<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview de Mi Juego PixelArt</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jacquarda+Bastarda+9&family=VT323&display=swap" rel="stylesheet">

    <style>
      :root {
        --pixel-bg: #120505; 
        --pixel-text: #fff2f2; 
        --pixel-gold: #8b0000; /* Rojo sangre profundo */
        --pixel-red: #cc0000;  /* Rojo sangre brillante */
        --metal-dark: #3d1a1a; 
        --metal-light: #8b3a3a; 
    }

        body, html {
            margin: 0; padding: 0; height: 100%;
            /* Fuente medieval para todo el cuerpo */
            font-family: 'Jacquarda Bastarda 9', serif; 
            overflow: hidden;
            background-color: var(--pixel-bg);
            image-rendering: pixelated;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; color: var(--pixel-text);
            z-index: 1;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.2) 3px, rgba(0,0,0,0.2) 4px);
            z-index: 0; pointer-events: none;
        }

        .content-box {
            z-index: 10;
            padding: 20px;
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            /* Fuente medieval gótica */
            font-family: 'Jacquarda Bastarda 9', serif;
            font-size: 7rem; margin: 0; text-transform: uppercase;
            color: var(--pixel-red);
            /* Sombra que simula goteo/profundidad de sangre */
            text-shadow: 
                0px 5px 0px #4a0000, 
                0px 10px 0px #2a0000,
                5px 5px 0px #000;
            letter-spacing: 8px;
            line-height: 1;
        }

        p {
            font-family: 'VT323', monospace; /* Estilo pixel clásico para lectura */
            font-size: 2rem; max-width: 700px; margin: 20px auto 40px auto;
            color: #ccc; text-shadow: 2px 2px 0px #000;
            background-color: rgba(0,0,0,0.8);
            border: 4px solid var(--pixel-gold); padding: 15px;
            box-shadow: 5px 5px 0px black;
        }

        .btn-pixel {
            display: inline-block;
            padding: 15px 35px;
            font-family: 'VT323', monospace;
            font-size: 2.2rem;
            text-decoration: none;
            text-transform: uppercase;
            color: white;
            background-color: var(--pixel-red);
            border: 4px solid #000;
            box-shadow: inset -5px -5px 0px rgba(0,0,0,0.5), 5px 5px 0px rgba(0,0,0,0.8);
            transition: all 0.1s;
            cursor: pointer;
            margin: 10px;
        }
        
        .btn-pixel:hover { 
            transform: scale(1.05); 
            background-color: #ff0000;
            box-shadow: 0 0 15px var(--pixel-red);
        }
        
        .btn-pixel:active { transform: scale(0.95); }

        #menu-opciones {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            animation: fadeIn 0.3s steps(4);
        }

        .btn-small {
            font-size: 1.5rem;
            padding: 10px 20px;
            width: 280px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- ANTORCHAS --- */
        .torch-container {
            position: absolute; top: 50%; z-index: 5;
            display: flex; flex-direction: column; align-items: center;
            transform: translateY(-50%) scale(4); 
        }
        .torch-left { left: 0; margin-left: 10px; }
        .torch-right { right: 0; margin-right: 10px; transform: translateY(-50%) scale(4) scaleX(-1); }

        .medieval-bracket {
            width: 4px; height: 4px; background: transparent; margin-top: 2px;
            box-shadow: -4px 0px 0px var(--metal-dark), -4px 4px 0px var(--metal-dark), -4px 8px 0px var(--metal-dark), -4px 12px 0px var(--metal-dark), -4px 2px 0px black, -4px 10px 0px black, 0px 12px 0px var(--metal-dark), 4px 10px 0px var(--metal-dark), 8px 8px 0px var(--metal-dark), 6px 4px 0px var(--metal-dark), 10px 4px 0px var(--metal-dark), 4px 4px 0px var(--metal-light), 12px 4px 0px var(--metal-light), 4px 6px 0px var(--metal-dark), 12px 6px 0px var(--metal-dark), 6px 8px 0px var(--metal-dark), 10px 8px 0px var(--metal-dark);
        }

        .pixel-fire {
            width: 4px; height: 4px; background: transparent;
            margin-left: 16px; margin-bottom: -4px; opacity: 0.9;
            animation: pixelBurn 1.5s infinite steps(8);
            filter: drop-shadow(0 0 5px cyan);
        }
        
        @keyframes pixelBurn {
            0% { box-shadow: 0px 0px 0px #00008b, 4px 0px 0px #00008b, -4px 0px 0px #00008b, 0px -4px 0px #00bfff, 4px -4px 0px #00bfff, -4px -4px 0px #00008b, 0px -8px 0px #e0ffff, 4px -8px 0px #00bfff, -4px -8px 0px #00bfff, 0px -12px 0px #e0ffff, -4px -12px 0px #e0ffff; }
            33% { box-shadow: 0px 0px 0px #00008b, 4px 0px 0px #00008b, -4px 0px 0px #00008b, 4px -4px 0px #00bfff, 8px -4px 0px #00bfff, 0px -4px 0px #00008b, 4px -8px 0px #e0ffff, 8px -8px 0px #00bfff, 0px -8px 0px #00bfff, 8px -12px 0px #e0ffff, 4px -12px 0px #e0ffff, 12px -16px 0px rgba(0, 191, 255, 0.4); }
            66% { box-shadow: 0px 0px 0px #00008b, 4px 0px 0px #00008b, -4px 0px 0px #00008b, -4px -4px 0px #00bfff, 0px -4px 0px #00bfff, -8px -4px 0px #00008b, -4px -8px 0px #e0ffff, 0px -8px 0px #00bfff, -8px -8px 0px #00bfff, -4px -12px 0px #e0ffff, -8px -12px 0px #e0ffff, -12px -16px 0px rgba(0, 191, 255, 0.2); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 3.5rem; }
            .torch-container { transform: translateY(-50%) scale(2); }
            .torch-right { transform: translateY(-50%) scale(2) scaleX(-1); }
        }
    </style>
</head>
<body>

   
    <video autoplay muted loop id="video-background">
        <source src="videos/Intro_mejorado.mp4" type="video/mp4">
    </video>

    <div class="scanlines"></div>

    <div class="overlay">

        <div class="torch-container torch-left">
            <div class="pixel-fire"></div>
            <div class="medieval-bracket"></div>
        </div>

        <div class="content-box">
            <h1>RED MOON</h1>
            <p>La oscuridad se acerca. Prepara tu espada y defiende el reino.</p>
            
            <button id="btn-main" class="btn-pixel" onclick="toggleMenu()">JUGAR AHORA</button>

            <div id="menu-opciones">
                <a href="https://alexantonio29.github.io/phaserEscuela/" target="_blank" class="btn-pixel btn-small">🌐 JUGAR EN WEB</a>
<a href="https://store.steampowered.com" target="_blank" class="btn-pixel btn-small" style="background-color: #1b2838; text-decoration: none; color: white;">
    <img src="imagenes/Steam.png" alt="Steam" style="height: 1.2em; vertical-align: middle; margin-right: 5px;"> 
    <span style="vertical-align: middle;">IR A STEAM</span>
</a>
                <a href="descarga/juego.zip" download class="btn-pixel btn-small" style="background-color: #2e7d32;">💾 DESCARGAR</a>
                <span onclick="toggleMenu()" style="cursor:pointer; color: #ff4444; display:block; margin-top:10px; font-family:'VT323'; font-size: 1.5rem;">[ REGRESAR ]</span>
            </div>
        </div>

        <div class="torch-container torch-right">
            <div class="pixel-fire"></div>
            <div class="medieval-bracket"></div>
        </div>

    </div>

    <script>
        function toggleMenu() {
            const btnMain = document.getElementById('btn-main');
            const menu = document.getElementById('menu-opciones');
            
            if (menu.style.display === 'none' || menu.style.display === '') {
                menu.style.display = 'flex';
                btnMain.style.display = 'none';
            } else {
                menu.style.display = 'none';
                btnMain.style.display = 'inline-block';
            }
        }
    </script>

</body>
</html>
